<main class="min-h-screen flex items-center justify-center p-6 sm:p-12 relative overflow-hidden bg-[#f9f9ff] text-[#191c21] font-sans">

  <div class="absolute top-[-10%] right-[-5%] w-[40%] h-[60%] bg-[#ecedf6] rounded-full blur-[120px] opacity-50 -z-10"></div>
  <div class="absolute bottom-[-10%] left-[-5%] w-[30%] h-[50%] bg-[#d6e3ff] opacity-20 blur-[100px] -z-10"></div>

  <div class="w-full max-w-[480px]">

<!-- Branding -->
<div class="mb-12 text-center">
  <div class="inline-flex items-center justify-center w-12 h-12 rounded-xl mb-4 overflow-hidden">
    
    <img 
      src="/Images/WhatsApp Image 2026-04-16 at 9.09.11 PM.jpeg" 
      alt="Ball Icon"
      class="w-full h-full object-cover"
    />

  </div>

  <h1 class="font-extrabold text-3xl tracking-tight">Editorial Trust</h1>
  <p class="mt-2 text-sm text-[#486176]">Secure access to the curator's platform</p>
</div>

    <div class="bg-white rounded-xl shadow-[0_20px_40px_rgba(25,28,33,0.06)] p-8 md:p-10">

      <div class="mb-8">
        <h2 class="font-bold text-2xl tracking-tight mb-2">Create an account</h2>
        <p class="text-sm text-[#424752]">
          Join the platform for architectural content management.
        </p>
      </div>

      <form class="space-y-6">

        <div class="space-y-1.5">
          <label class="text-[11px] font-semibold uppercase tracking-wider text-[#424752]">
            Full Name
          </label>
          <input
            type="text"
            placeholder="Enter Your Full Name"
            class="w-full bg-[#f2f3fb] rounded-xl py-3.5 px-4 text-[#191c21] placeholder:text-[#727783] focus:ring-2 focus:ring-[#005db5]/40 outline-none text-sm"
          />
        </div>

        <!-- Email -->
        <div class="space-y-1.5">
          <label class="text-[11px] font-semibold uppercase tracking-wider text-[#424752]">
            Email Address
          </label>
          <input
            type="email"
            placeholder="Enter Your Email Address"
            class="w-full bg-[#f2f3fb] rounded-xl py-3.5 px-4 text-[#191c21] placeholder:text-[#727783] focus:ring-2 focus:ring-[#005db5]/40 outline-none text-sm"
          />
        </div>
         <!-- Birth Date -->
        <div class="space-y-1.5">
          <label class="text-[11px] font-semibold uppercase tracking-wider text-[#424752]">
            Birth Date
          </label>
          <input
            type="date"
            placeholder="Enter Your Birth Date"
            class="w-full bg-[#f2f3fb] rounded-xl py-3.5 px-4 text-[#191c21] placeholder:text-[#727783] focus:ring-2 focus:ring-[#005db5]/40 outline-none text-sm"
          />
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">

          <!-- Password -->
          <div class="space-y-1.5">
            <label class="text-[11px] font-semibold uppercase tracking-wider text-[#424752]">
              Password
            </label>
            <input
              type="password"
              placeholder="••••••••"
              class="w-full bg-[#f2f3fb] rounded-xl py-3.5 px-4 text-[#191c21] placeholder:text-[#727783] focus:ring-2 focus:ring-[#005db5]/40 outline-none text-sm"
            />
          </div>

          <!-- Confirm -->
          <div class="space-y-1.5">
            <label class="text-[11px] font-semibold uppercase tracking-wider text-[#424752]">
              Confirm Password
            </label>
            <input
              type="password"
              placeholder="••••••••"
              class="w-full bg-[#f2f3fb] rounded-xl py-3.5 px-4 text-[#191c21] placeholder:text-[#727783] focus:ring-2 focus:ring-[#005db5]/40 outline-none text-sm"
            />
          </div>

        </div>

        <!-- Button -->
<button
  type="button"
  routerLink="/login"
  class="w-full text-white font-bold py-4 rounded-xl shadow-lg transition-all duration-200 mt-4 hover:scale-[1.02]"
  style="background: linear-gradient(135deg, #00488d 0%, #005fb8 100%);">
  Sign Up
</button>

      </form>

      <!-- Footer -->
      <div class="mt-8 pt-8 border-t border-[#e1e2ea] flex flex-col items-center gap-4">
        <p class="text-sm text-[#424752]">
          Already have an account?
          <a routerLink="/login" class="text-[#00488d] font-semibold hover:underline">Sign In</a>
        </p>
      </div>

    </div>

    <div class="mt-12 flex items-center justify-between px-2">
      <div>
        <span class="font-bold text-3xl block">12k+</span>
        <span class="text-[11px] font-semibold uppercase tracking-widest text-[#486176]">
          Active Curators
        </span>
      </div>

      <div class="h-12 w-[1px] bg-[#e1e2ea]"></div>

      <div class="text-right">
        <span class="font-bold text-3xl text-[#7b3200] block">99.9%</span>
        <span class="text-[11px] font-semibold uppercase tracking-widest text-[#486176]">
          Trust Rating
        </span>
      </div>
    </div>

  </div>

</main>
